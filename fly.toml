# fly.toml app configuration for tab402
# Deploy: flyctl launch --image tab402 --region iad
# See https://fly.io/docs/reference/configuration/ for more info

app = "tab402"
primary_region = "iad"

[build]
  builder = "dockerfile"
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 4021
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024